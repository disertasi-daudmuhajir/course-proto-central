syntax = "proto3";

package hello.v1;

option java_package = "com.course.central.proto.hello";

message SayHelloRequest {
  string name = 1;
  uint32 age = 16;
}

message SayHelloResponse {
  string greet = 1;
}

service HelloService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse) {}
  rpc SayManyHellos(SayHelloRequest) returns (stream SayHelloResponse) {}
  rpc SayHelloToEveryone(stream SayHelloRequest) returns (stream SayHelloResponse) {}
  rpc SayHelloContinuous(stream SayHelloRequest) returns (stream SayHelloResponse) {}
}
